version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16-latest
    container_name: matios-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-matios}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matios}
      POSTGRES_DB: ${POSTGRES_DB:-matios_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-matios}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - matios-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: matios-api
    command: uvicorn src.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8000} --reload
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-matios}:${POSTGRES_PASSWORD:-matios}@postgres:5432/${POSTGRES_DB:-matios_db}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      ENV: ${ENV:-development}
      DEBUG: ${DEBUG:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - matios-network

volumes:
  postgres_data:

networks:
  matios-network:
    driver: bridge
